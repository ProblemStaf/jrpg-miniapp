<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Поиски Тайн - RPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <!-- Верхняя панель -->
    <header class="game-header">
        <div class="stats-row">
            <div class="stat hp-stat">
                <span>❤️ HP:</span>
                <span id="hp">100/100</span>
                <div class="bar-container"><div id="hp-bar" class="bar hp-bar"></div></div>
            </div>
            <div class="stat gold-stat">
                <span>💰</span>
                <span id="gold">0</span>
            </div>
            <div class="stat level-stat">
                <span>⭐ Lvl:</span>
                <span id="level">1</span>
            </div>
        </div>
        <div class="exp-row">
            <span>📊 Опыт:</span>
            <span id="exp">0/100</span>
            <div class="bar-container"><div id="exp-bar" class="bar exp-bar"></div></div>
        </div>
    </header>

    <!-- Игровая карта -->
    <main class="game-map" id="game-map">
        <div id="player" class="player">🧙‍♂️</div>
        <!-- Декоративные элементы -->
        <div class="tile tree" style="left: 120px; top: 80px;">🌲</div>
        <div class="tile tree" style="left: 200px; top: 160px;">🌲</div>
        <div class="tile chest" style="left: 280px; top: 120px;">📦</div>
        <div class="tile rock" style="left: 80px; top: 200px;">🪨</div>
    </main>

    <!-- Панель действий -->
    <section class="action-panel">
        <button id="daily-btn" class="action-btn daily">🎁 Ежедневно</button>
        <button id="fight-btn" class="action-btn fight">⚔️ Бой</button>
        <button id="heal-btn" class="action-btn heal">💚 Лечение</button>
    </section>

    <!-- Инвентарь -->
    <section class="inventory-panel">
        <h3>🎒 Инвентарь</h3>
        <div id="inventory-list" class="inventory-list">
            <div>Загрузка...</div>
        </div>
    </section>

    <!-- Крафт -->
    <section class="craft-panel">
        <h3>🔨 Крафт</h3>
        <div class="craft-recipes">
            <button class="craft-btn" data-recipe="Зелье маны">
                🧪 Зелье маны<br><small>Трава x2, Вода x1</small>
            </button>
            <button class="craft-btn" data-recipe="Стальной меч">
                ⚔️ Стальной меч<br><small>Железо x3, Дерево x2</small>
            </button>
            <button class="craft-btn" data-recipe="Броня">
                🛡️ Броня<br><small>Кожа x5, Железо x2</small>
            </button>
        </div>
    </section>

    <!-- Лидерборд -->
    <section class="leaderboard-panel">
        <h3>🏆 Топ игроков</h3>
        <div id="leaderboard-list" class="leaderboard-list">
            <div>Загрузка...</div>
        </div>
    </section>

    <!-- Модальное окно боя -->
    <div id="battle-modal" class="modal battle-modal" style="display:none;">
        <div class="modal-content">
            <h2>⚔️ Бой с <span id="enemy-name">Гоблин</span></h2>
            <div class="enemy-stats">
                <div class="enemy-hp-bar">
                    <span>HP: <span id="enemy-hp">50/50</span></span>
                    <div class="bar-container"><div id="enemy-hp-bar" class="bar enemy-bar"></div></div>
                </div>
            </div>
            <div class="battle-actions">
                <button onclick="fight('attack')" class="battle-btn attack">⚔️ Атака</button>
                <button onclick="fight('heal')" class="battle-btn heal">💚 Лечение</button>
                <button onclick="hideBattleUI()" class="battle-btn run">🏃 Бежать</button>
            </div>
            <div id="battle-log" class="battle-log"></div>
        </div>
    </div>

    <!-- Уведомления -->
    <div id="notifications" class="notifications"></div>

    <script src="script.js"></script>
</body>
</html>
