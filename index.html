<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dungeon Crawler: Roguelike</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Header / Stats -->
        <header id="ui-header">
            <div class="stat-box">
                <span class="label">HP</span>
                <span id="hp-val" class="val hp">100/100</span>
            </div>
            <div class="stat-box">
                <span class="label">LVL</span>
                <span id="lvl-val" class="val">1</span>
            </div>
            <div class="stat-box">
                <span class="label">XP</span>
                <span id="xp-val" class="val">0/50</span>
            </div>
            <div class="stat-box">
                <span class="label">GOLD</span>
                <span id="gold-val" class="val gold">0</span>
            </div>
            <div class="stat-box">
                <span class="label">FLOOR</span>
                <span id="floor-val" class="val">1</span>
            </div>
        </header>

        <!-- Main Game Area -->
        <main id="game-area">
            <canvas id="game-canvas"></canvas>
            
            <!-- Overlay Messages -->
            <div id="message-log"></div>
            
            <!-- Start/Game Over Screen -->
            <div id="overlay-screen" class="active">
                <h1 id="overlay-title">DUNGEON CRAWLER</h1>
                <p id="overlay-desc">Спускайся глубже. Сражайся. Выживай.</p>
                <button id="start-btn" class="btn-primary">НАЧАТЬ ИГРУ</button>
                <div id="high-scores" class="hidden">
                    <h3>Лучшие результаты</h3>
                    <ul id="scores-list"></ul>
                </div>
            </div>
        </main>

        <!-- Controls / Inventory -->
        <footer id="ui-footer">
            <div class="panel">
                <h3>ИНВЕНТАРЬ</h3>
                <div id="inventory-list" class="list-container">
                    <div class="empty-msg">Пусто</div>
                </div>
            </div>
            <div class="panel controls-hint">
                <p>WASD / Стрелки - Движение</p>
                <p>SPACE - Пропустить ход</p>
                <p>E - Подобрать предмет</p>
                <p>I - Инвентарь (Использовать)</p>
            </div>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
